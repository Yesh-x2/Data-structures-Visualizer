LINKED LIST VISUALIZER
</h1>

<p>

Linked List consists of nodes.
Each node contains data and a link
to the next node.

</p>

<br>

<input
type="number"
id="size"
placeholder="List Size">

<button onclick="createList()">
Create List
</button>

<br><br>

<input

<button onclick="insertNode()">

</button>

</button>
