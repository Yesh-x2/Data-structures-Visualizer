<!DOCTYPE html>
<html>
<head>
    <title>Queue Types</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="section">

    <h1>QUEUE TYPES</h1>

    <div class="cards">

        <div class="card" onclick="showSection('simple')">
            <h2>Simple Queue</h2>
            <p>FIFO Queue</p>
        </div>

        <div class="card" onclick="showSection('circular')">
            <h2>Circular Queue</h2>
            <p>Circular FIFO Queue</p>
        </div>

        <div class="card" onclick="showSection('priority')">
            <h2>Priority Queue</h2>
            <p>Priority Based Queue</p>
        </div>

        <div class="card" onclick="showSection('deque')">
            <h2>Deque</h2>
            <p>Double Ended Queue</p>
        </div>

    </div>

</div>

<!-- Simple Queue -->

<div id="simple" class="queueSection">

    <h2>Simple Queue</h2>

    <input id="simpleValue" placeholder="Value">

    <button onclick="enqueueSimple()">Enqueue</button>
    <button onclick="dequeueSimple()">Dequeue</button>

    <div id="simpleDisplay" class="visual"></div>

</div>

<!-- Circular Queue -->

<div id="circular" class="queueSection" style="display:none">

    <h2>Circular Queue</h2>

    <input id="circularValue" placeholder="Value">

    <button onclick="enqueueCircular()">Enqueue</button>
    <button onclick="dequeueCircular()">Dequeue</button>

    <div id="circularDisplay" class="visual"></div>

</div>

<!-- Priority Queue -->

<div id="priority" class="queueSection" style="display:none">

    <h2>Priority Queue</h2>

    <input id="priorityValue" placeholder="Value">
    <input id="priorityNumber" placeholder="Priority">

    <button onclick="insertPriority()">Insert</button>
    <button onclick="deletePriority()">Delete</button>

    <div id="priorityDisplay" class="visual"></div>

</div>

<!-- Deque -->

<div id="deque" class="queueSection" style="display:none">

    <h2>Deque</h2>

    <input id="dequeValue" placeholder="Value">

    <button onclick="insertFront()">Insert Front</button>
    <button onclick="insertRear()">Insert Rear</button>

    <button onclick="deleteFront()">Delete Front</button>
    <button onclick="deleteRear()">Delete Rear</button>

    <div id="dequeDisplay" class="visual"></div>

</div>

<script src="../js/queue.js"></script>

</body>
</html>
