href="../css/style.css">

<section class="section">

<h1>
STACK VISUALIZER
</h1>

<p>

Stack follows the
Last In First Out (LIFO)
principle.

</p>

<br>

<input
type="number"
id="size"
placeholder="Stack Size">

<button onclick="createStack()">
Create Stack
</button>

<br><br>

<input
id="value"
placeholder="Enter Value">

<br><br>

<button onclick="pushElement()">
Push
</button>

<button onclick="popElement()">
Pop
</button>

<button onclick="peekElement()">
Peek
</button>

<button onclick="searchElement()">
Search
</button>

<button onclick="resetStack()">
Reset
</button>

<h2 id="message"></h2>

<div id="stackContainer"
class="stackArea">
</div>

</section>

<script src="../js/stack.js"></script>

</body>
